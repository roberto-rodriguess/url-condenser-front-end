<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Condenser</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>URL Condenser</h1>
    <p>Encurte suas URLs de forma simples e rápida</p>
</header>

<main>
    <section class="card" aria-labelledby="form-title">
        <h2 id="form-title">Criar URL curta</h2>

        <form id="urlForm">
            <div class="form-group">
                <label for="urlInput" class="sr-only">Digite a URL original</label>
                <input
                        id="urlInput"
                        type="url"
                        placeholder="https://exemplo.com"
                        required
                >
            </div>
            <button type="submit">Encurtar</button>
        </form>

        <div id="result" aria-live="polite"></div>
    </section>

    <section class="card" aria-labelledby="table-title">
        <h2 id="table-title">URLs cadastradas</h2>
        <div class="table-container"> <table>
            <thead>
            <tr>
                <th scope="col">Original</th>
                <th scope="col">Código</th>
                <th scope="col">Cliques</th>
                <th scope="col">Ações</th>
            </tr>
            </thead>
            <tbody id="urlTable">
            </tbody>
        </table>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
